events { worker_connections 1024; }

http {
  server {
    listen 80;
    

    # W2 D6: route /api/users/* -> user-service:8002
    location ~* ^/api/users/(.*)$ {
      proxy_pass http://user-service:8002;
    }

    # W2 D6: route /api/questions/* -> question-management-service:8003
    location ~* ^/api/questions/(.*)$ {
      proxy_pass http://question-management-service:8003;
    }

    # W2 D6: route /api/sessions/* -> test-management-service:8001
    location ~* ^/api/sessions/(.*)$ {
      proxy_pass http://test-management-service:8001;
    }

    # W2 D6: default fallback to frontend:3000
    location / {
      proxy_pass http://frontend:3000;
    }
  }
}
