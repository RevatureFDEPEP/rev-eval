name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend-build-test:
    name: Backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ${{ secrets.JWT_SIGNING_SECRET }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - question-management-service
          - test-management-service
          - api-gateway-service
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Verify JWT_SECRET is set
        run: |
          if [ -z "${JWT_SECRET}" ]; then
            echo "❌ JWT_SECRET is empty — was the repo secret configured?"
            exit 1
          fi
          echo "✅ JWT_SECRET length: ${#JWT_SECRET}"

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          # Install service runtime dependencies first, then shared test/dev dependencies.
          pip install -r requirements.txt
          pip install -r ../requirements-dev.txt
          
      - name: Run pytest
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -d tests ]; then
            pytest --cov --cov-report=xml
          else
            echo "No tests/ directory in services/${{ matrix.service }} — skipping pytest."
          fi

      # NOTE: Trivy + Ruff scans added in W2 D7 by candidates (not seeded here)

  frontend-build-test:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          # Match frontend/package.json packageManager: pnpm@9.15.0.
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm lint || echo "Frontend lint currently has existing issues; not blocking CI yet."

      - name: Build
        working-directory: frontend
        run: pnpm build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'frontend/.next/**/*'

      - name: Test
        working-directory: frontend
        run: pnpm test --if-present
