name: CI Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  backend-build-test:
    name: Backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ${{ secrets.JWT_SIGNING_SECRET }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - question-management-service
          - test-management-service
          - api-gateway-service
    steps:
      # Use the newer checkout action for consistent behavior across jobs
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Verify JWT_SECRET is set
        run: |
          if [ -z "${JWT_SECRET}" ]; then
            echo "❌ JWT_SECRET is empty — was the repo secret configured?"
            exit 1
          fi
          echo "✅ JWT_SECRET length: ${#JWT_SECRET}"

      - name: Install dependencies
        # Fix: install from service root where requirements.txt actually lives
        working-directory: services/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest
        working-directory: services/${{ matrix.service }}
        run: |
          # Fix: fail the job if no tests directory exists so CI doesn't silently pass
          if [ -d tests ]; then
            pytest --cov --cov-report=xml
          else
            echo "❌ No tests/ directory in services/${{ matrix.service }} — failing CI."
            exit 1
          fi

      # NOTE: Trivy + Ruff scans added in W2 D7 by candidates (not seeded here)

  frontend-build-test:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Build
        working-directory: frontend
        run: pnpm build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'frontend/.next/**/*'

      - name: Test
        working-directory: frontend
        run: pnpm test --if-present
