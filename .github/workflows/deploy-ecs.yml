name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

env:
  AWS_REGION: us-west-1
  AWS_ACCOUNT_ID: 407975137156
  ECR_REGISTRY: 407975137156.dkr.ecr.us-west-1.amazonaws.com
  PROJECT_NAME: rev-evalai

  # Terraform Variables - AWS Configuration (Static)
  TF_VAR_aws_region: us-west-1
  TF_VAR_aws_account_id: 407975137156
  TF_VAR_project_name: rev-evalai
  TF_VAR_environment: prod

  # Terraform Variables - Database Configuration (Static)
  TF_VAR_create_rds: false
  TF_VAR_existing_db_port: "5432"

  # Terraform Variables - ElevenLabs (Static)
  TF_VAR_elevenlabs_voice_id: s3TPKV1kjDlVtZbl4Ksh

  # Terraform Variables - SQS URLs (Static, from terraform.tfvars)
  TF_VAR_ai_quiz_sqs_queue_url: https://sqs.us-west-1.amazonaws.com/407975137156/rev-evalai-quiz-evaluation-queue
  TF_VAR_test_service_sqs_queue_url: https://sqs.us-west-1.amazonaws.com/407975137156/rev-evalai-notification-service-queue
  TF_VAR_notification_sqs_queue_url: https://sqs.us-west-1.amazonaws.com/407975137156/rev-evalai-notification-service-queue

  # Terraform Variables - SES (Static)
  TF_VAR_ses_sender_name: "Rev EvalAI"

  # Terraform Variables - Bedrock (Static)
  TF_VAR_bedrock_model_id: "global.anthropic.claude-sonnet-4-5-20250929-v1:0"
  TF_VAR_bedrock_max_tokens: 2048
  TF_VAR_bedrock_temperature: 0.7

  # Note: Sensitive variables (DB, MongoDB, WorkOS, ElevenLabs API key, SES sender email, Frontend URLs)
  # are fetched from AWS Secrets Manager in the "Fetch secrets" step

jobs:
  build-and-deploy:
    name: Build and Deploy to ECS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for AWS OIDC

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch secrets from AWS Secrets Manager
        id: fetch-secrets
        run: |
          echo "Fetching secrets from AWS Secrets Manager..."

          # Fetch RDS secrets
          RDS_SECRET=$(aws secretsmanager get-secret-value --secret-id prod/rev-evalai/rds --region ${{ env.AWS_REGION }} --query SecretString --output text)
          echo "TF_VAR_existing_db_host=$(echo $RDS_SECRET | jq -r '.["db-host"]')" >> $GITHUB_ENV
          echo "TF_VAR_db_username=$(echo $RDS_SECRET | jq -r '.["db-username"]')" >> $GITHUB_ENV
          echo "TF_VAR_db_password=$(echo $RDS_SECRET | jq -r '.["db-password"]')" >> $GITHUB_ENV
          echo "TF_VAR_db_name=$(echo $RDS_SECRET | jq -r '.["db-name"]')" >> $GITHUB_ENV
          echo "TF_VAR_user_db_name=$(echo $RDS_SECRET | jq -r '.["user-db-name"]')" >> $GITHUB_ENV

          # Fetch MongoDB secrets
          MONGO_SECRET=$(aws secretsmanager get-secret-value --secret-id prod/rev-evalai/mongo --region ${{ env.AWS_REGION }} --query SecretString --output text)
          echo "TF_VAR_mongo_user=$(echo $MONGO_SECRET | jq -r '.["mongo-user"]')" >> $GITHUB_ENV
          echo "TF_VAR_mongo_password=$(echo $MONGO_SECRET | jq -r '.["mongo-password"]')" >> $GITHUB_ENV
          echo "TF_VAR_mongo_cluster=$(echo $MONGO_SECRET | jq -r '.["mongo-cluster"]')" >> $GITHUB_ENV
          echo "TF_VAR_mongo_db=$(echo $MONGO_SECRET | jq -r '.["mongo-db"]')" >> $GITHUB_ENV
          echo "TF_VAR_mongo_appname=$(echo $MONGO_SECRET | jq -r '.["mongo-appname"]')" >> $GITHUB_ENV

          # Fetch WorkOS secrets
          WORKOS_SECRET=$(aws secretsmanager get-secret-value --secret-id prod/rev-evalai/workos --region ${{ env.AWS_REGION }} --query SecretString --output text)
          echo "TF_VAR_workos_api_key=$(echo $WORKOS_SECRET | jq -r '.["workos-api-key"]')" >> $GITHUB_ENV
          echo "TF_VAR_workos_client_id=$(echo $WORKOS_SECRET | jq -r '.["workos-client-id"]')" >> $GITHUB_ENV
          echo "TF_VAR_workos_default_org=$(echo $WORKOS_SECRET | jq -r '.["workos-default-org"]')" >> $GITHUB_ENV
          echo "TF_VAR_workos_cookie_password=$(echo $WORKOS_SECRET | jq -r '.["workos-cookie-password"]')" >> $GITHUB_ENV
          echo "TF_VAR_workos_invite_url=$(echo $WORKOS_SECRET | jq -r '.["workos-invite-url"]')" >> $GITHUB_ENV

          # Fetch ElevenLabs secrets
          ELEVENLABS_SECRET=$(aws secretsmanager get-secret-value --secret-id prod/rev-evalai/elevenlabs --region ${{ env.AWS_REGION }} --query SecretString --output text)
          echo "TF_VAR_elevenlabs_api_key=$(echo $ELEVENLABS_SECRET | jq -r '.["elevenlabs-api-key"]')" >> $GITHUB_ENV

          # Fetch SES secrets
          SES_SECRET=$(aws secretsmanager get-secret-value --secret-id prod/rev-evalai/ses --region ${{ env.AWS_REGION }} --query SecretString --output text)
          echo "TF_VAR_ses_sender_email=$(echo $SES_SECRET | jq -r '.["ses-sender-email"]')" >> $GITHUB_ENV

          # Fetch Frontend build-time secrets
          FRONTEND_SECRET=$(aws secretsmanager get-secret-value --secret-id prod/rev-evalai/frontend --region ${{ env.AWS_REGION }} --query SecretString --output text)
          echo "NEXT_PUBLIC_API_GATEWAY_URL=$(echo $FRONTEND_SECRET | jq -r '.["next-public-api-gateway-url"]')" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_WORKOS_REDIRECT_URI=$(echo $FRONTEND_SECRET | jq -r '.["next-public-workos-redirect-uri"]')" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_INTERVIEW_WS_URL=$(echo $FRONTEND_SECRET | jq -r '.["next-public-interview-ws-url"]')" >> $GITHUB_ENV

          echo "✅ All secrets fetched successfully from AWS Secrets Manager"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get commit SHA (short)
        id: git-sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Detect changed services - builds are conditional, but terraform and force deployments always run
      - name: Detect changed services
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            api-gateway:
              - 'services/api-gateway-service/**'
            user-service:
              - 'services/user-service/**'
            test-management:
              - 'services/test-management-service/**'
            question-management:
              - 'services/question-management-service/**'
            notification:
              - 'services/notification-service/**'
            ai-quiz:
              - 'services/ai-quiz-service/**'
            ai-interview:
              - 'services/ai-interview-service/**'
            frontend:
              - 'frontend/**'
            terraform:
              - 'deploy/terraform/**'

      # Build and push API Gateway
      - name: Build and push API Gateway
        if: steps.changes.outputs.api-gateway == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway-service
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/api-gateway:latest
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/api-gateway:${{ steps.git-sha.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push User Service
      - name: Build and push User Service
        if: steps.changes.outputs.user-service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/user-service
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/user-service:latest
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/user-service:${{ steps.git-sha.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Test Management Service
      - name: Build and push Test Management Service
        if: steps.changes.outputs.test-management == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/test-management-service
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/test-management-service:latest
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/test-management-service:${{ steps.git-sha.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Question Management Service
      - name: Build and push Question Management Service
        if: steps.changes.outputs.question-management == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/question-management-service
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/question-management-service:latest
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/question-management-service:${{ steps.git-sha.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Notification Service
      - name: Build and push Notification Service
        if: steps.changes.outputs.notification == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/notification-service
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/notification-service:latest
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/notification-service:${{ steps.git-sha.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push AI Quiz Service
      - name: Build and push AI Quiz Service
        if: steps.changes.outputs.ai-quiz == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-quiz-service
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/ai-quiz-service:latest
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/ai-quiz-service:${{ steps.git-sha.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push AI Interview Service
      - name: Build and push AI Interview Service
        if: steps.changes.outputs.ai-interview == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-interview-service
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/ai-interview-service:latest
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/ai-interview-service:${{ steps.git-sha.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Frontend
      - name: Build and push Frontend
        if: steps.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          target: production
          build-args: |
            NEXT_PUBLIC_API_GATEWAY_URL=${{ env.NEXT_PUBLIC_API_GATEWAY_URL }}
            NEXT_PUBLIC_WORKOS_REDIRECT_URI=${{ env.NEXT_PUBLIC_WORKOS_REDIRECT_URI }}
            NEXT_PUBLIC_INTERVIEW_WS_URL=${{ env.NEXT_PUBLIC_INTERVIEW_WS_URL }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/frontend:latest
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/frontend:${{ steps.git-sha.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Note: Infrastructure is managed separately via local Terraform
      # This workflow only deploys application updates to existing ECS services

      # Update ECS services to use new images
      - name: Force new deployment - API Gateway
        run: |
          aws ecs update-service \
            --cluster rev-evalai-cluster \
            --service api-gateway \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Force new deployment - User Service
        run: |
          aws ecs update-service \
            --cluster rev-evalai-cluster \
            --service user-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Force new deployment - Test Management
        run: |
          aws ecs update-service \
            --cluster rev-evalai-cluster \
            --service test-management-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Force new deployment - Question Management
        run: |
          aws ecs update-service \
            --cluster rev-evalai-cluster \
            --service question-management-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Force new deployment - Notification Service
        run: |
          aws ecs update-service \
            --cluster rev-evalai-cluster \
            --service notification-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Force new deployment - AI Quiz Service
        run: |
          aws ecs update-service \
            --cluster rev-evalai-cluster \
            --service ai-quiz-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Force new deployment - AI Interview Service
        run: |
          aws ecs update-service \
            --cluster rev-evalai-cluster \
            --service ai-interview-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Force new deployment - Frontend
        run: |
          aws ecs update-service \
            --cluster rev-evalai-cluster \
            --service frontend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deployment Summary
        run: |
          echo "✅ All images built and pushed successfully!"
          echo "🚀 ECS services are deploying new versions..."
          echo "📝 Commit: ${{ steps.git-sha.outputs.sha_short }}"
          echo ""
          echo "Monitor deployment:"
          echo "  aws ecs describe-services --cluster rev-evalai-cluster --services api-gateway --region ${{ env.AWS_REGION }}"
