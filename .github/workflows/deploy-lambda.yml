name: Deploy Interview Evaluator Lambda

on:
  push:
    branches:
      - main
    paths:
      - 'lambda/interview-evaluator/**'
      - '.github/workflows/deploy-lambda.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd lambda/interview-evaluator
          pip install -r requirements.txt -t .

      - name: Create deployment package
        run: |
          cd lambda/interview-evaluator
          zip -r deployment-package.zip . -x "*.git*" -x "*__pycache__*" -x "*.pyc"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - name: Deploy Lambda function
        run: |
          cd lambda/interview-evaluator
          aws lambda update-function-code \
            --function-name interview-evaluation-handler \
            --zip-file fileb://deployment-package.zip \
            --region us-west-1

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name interview-evaluation-handler \
            --region us-west-1

      - name: Deployment complete
        run: |
          echo "✅ Lambda function 'interview-evaluation-handler' deployed successfully!"
          aws lambda get-function \
            --function-name interview-evaluation-handler \
            --region us-west-1 \
            --query 'Configuration.[FunctionName,LastModified,Runtime,CodeSize]' \
            --output table
