# NOTE: This `docker-compose.yml` was updated to improve local development
# and service startup ordering. Changes include small configuration tweaks such as
# healthcheck timing, explicit service dependency hints, and environment variables
# (CORS / S3 endpoints) to make the stack easier to run locally and to allow the
# `api-gateway` to reliably route to backend services using compose internal DNS
# (service-name:port). These comments explain *why* the file was changed and
# provide context for future maintainers.
#
# If you didn't intend to commit local environment changes (IDE files, lockfiles),
# consider moving them to `.gitignore` or opening a dedicated feature branch.
services:
  postgres:
    image: postgres:15-alpine
    container_name: rev-eval-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      POSTGRES_DB: ${POSTGRES_DB:-eval_ai_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root} -h localhost -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: rev-eval-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-admin}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-evalai}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: rev-eval-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:alpine
    container_name: rev-eval-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: rev-eval-user-service
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-root}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-root}
      DB_NAME: ${POSTGRES_DB:-eval_ai_dev}
      SERVICE_NAME: user-service
      PORT: 8002
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-60}
      ALLOW_ORIGINS: http://localhost:3000
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  question-management-service:
    build:
      context: ./services/question-management-service
      dockerfile: Dockerfile
    container_name: rev-eval-question-management
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGODB_PASSWORD:-admin}@mongo:27017/${MONGO_DB:-evalai}?authSource=admin
      MONGO_DB: ${MONGO_DB:-evalai}
      MONGO_APPNAME: rev-eval
      SERVICE_NAME: question-management-service
      PORT: 8003
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-question-images}
      ALLOW_ORIGINS: http://localhost:3000
    ports:
      - "8003:8003"
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  test-management-service:
    build:
      context: ./services/test-management-service
      dockerfile: Dockerfile
    container_name: rev-eval-test-management
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-root}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-root}
      DB_NAME: ${POSTGRES_DB:-eval_ai_dev}
      SERVICE_NAME: test-management-service
      PORT: 8001
      SERVICE_HOSTNAME: test-management-service
      USER_SERVICE_URL: http://user-service:8002
      ALLOW_ORIGINS: http://localhost:3000
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api-gateway:
    build:
      context: ./services/api-gateway-service
      dockerfile: Dockerfile
    container_name: rev-eval-api-gateway
    restart: unless-stopped
    environment:
      SERVICE_NAME: api-gateway
      PORT: 8000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ALLOW_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      user-service:
        condition: service_healthy
      test-management-service:
        condition: service_healthy
      question-management-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: rev-eval-frontend
    restart: unless-stopped
    environment:
      API_GATEWAY_URL: http://api-gateway:8000
      NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:8000
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  mongo_data:
  minio_data:
